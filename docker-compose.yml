version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  auth-service:
    build:
      context: backend
      dockerfile: services/auth-service/Dockerfile
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET}
      - OAUTH_TWITTER_CLIENT_ID=${OAUTH_TWITTER_CLIENT_ID}
      - OAUTH_TWITTER_CLIENT_SECRET=${OAUTH_TWITTER_CLIENT_SECRET}
      - OAUTH_TWITTER_SCOPE=${OAUTH_TWITTER_SCOPE}
      - OAUTH_REDIRECT_BASE=${OAUTH_REDIRECT_BASE}
      - PRIVY_APP_ID=${PRIVY_APP_ID}
      - PRIVY_VERIFICATION_KEY=${PRIVY_VERIFICATION_KEY}
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis

  creator-service:
    build:
      context: backend
      dockerfile: services/creator-service/Dockerfile
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "8002:8002"
    depends_on:
      - postgres

  payment-service:
    build:
      context: backend
      dockerfile: services/payment-service/Dockerfile
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - INITIA_RPC_URL=${INITIA_RPC_URL}
      - INITIA_CHAIN_ID=${INITIA_CHAIN_ID}
      - INITIA_CLI_COMMAND=${INITIA_CLI_COMMAND}
    ports:
      - "8003:8003"
    depends_on:
      - postgres
      - rabbitmq

  analytics-service:
    build:
      context: backend
      dockerfile: services/analytics-service/Dockerfile
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "8004:8004"
    depends_on:
      - postgres

  indexer:
    build:
      context: backend
      dockerfile: services/indexer/Dockerfile
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - INITIA_RPC_URL=${INITIA_RPC_URL}
      - INITIA_CHAIN_ID=${INITIA_CHAIN_ID}
      - INITIA_TX_SEARCH_QUERY=${INITIA_TX_SEARCH_QUERY}
    ports:
      - "8005:8005"
    depends_on:
      - postgres

  frontend:
    build:
      context: frontend
    environment:
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE}
      - NEXT_PUBLIC_ANALYTICS_BASE=${NEXT_PUBLIC_ANALYTICS_BASE}
      - NEXT_PUBLIC_PRIVY_APP_ID=${NEXT_PUBLIC_PRIVY_APP_ID}
      - NEXT_PUBLIC_INITIA_CHAIN_ID=${NEXT_PUBLIC_INITIA_CHAIN_ID}
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - creator-service
      - payment-service
      - analytics-service

volumes:
  pgdata:
